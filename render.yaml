services:
  - type: web
    name: triagepilot-ai-backend
    runtime: python
    repo: https://github.com/jam398/ticket
    branch: main
    rootDir: backend
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m app.seed && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: TriagePilot AI
      - key: DATABASE_URL
        value: sqlite:///./support_tickets.db
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://jam398.github.io
      - key: SIMILARITY_THRESHOLD
        value: "0.70"
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_API_KEY
        sync: false
